# ── Front compartido (nginx) · enruta por dominio a las apps de Goventia ──────
# Cloudflare termina el TLS; el origin va por HTTP. La app recibe el
# X-Forwarded-Proto=https que reenvía Cloudflare (por eso NO usamos $scheme).

# Descarta peticiones con Host no reconocido (escaneos directos al IP del VPS).
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# ── SIGIPLAN ──────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name www.sigiplan.cl sigiplan.cl;

    # Adjuntos de iniciativas hasta 16 MB (el default de nginx es 1 MB → 413).
    client_max_body_size 16m;

    location / {
        resolver 127.0.0.11 valid=30s;            # DNS interno de Docker
        set $sigiplan http://sigiplan_app:5000;   # resolución diferida: arranca aunque la app no esté lista
        proxy_pass $sigiplan;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;   # "https" desde Cloudflare
        proxy_read_timeout 120s;
    }
}


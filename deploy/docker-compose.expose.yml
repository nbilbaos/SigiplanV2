# ── Override SOLO para staging por IP (sin dominio aún) ───────────────────────
# Publica el puerto de la app al host para poder entrar por http://IP_DEL_VPS:8090
# mientras no hay dominio/proxy. Úsalo junto al compose principal:
#
#   docker compose -f docker-compose.yml -f deploy/docker-compose.expose.yml up -d --build
#
# Requisitos en esta etapa:
#   - SECURE_COOKIES=false en el .env (si no, no podrás iniciar sesión por HTTP).
#   - Abrir el puerto 8090 en el firewall de Vultr.
# Cuando montes el dominio + proxy, deja de usar este override (no publiques la app).
services:
  app:
    ports:
      - "8090:5000"

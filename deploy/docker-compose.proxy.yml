# ── Front compartido (nginx) ──────────────────────────────────────────────────
# Toma el puerto 80 del host (que está libre: Cívica usa el 8080) y enruta por
# dominio a cada app vía la red externa "web". Es el ÚNICO componente compartido.
# No toca a Cívica, que sigue en su propio stack en el 8080.
#
#   docker compose -f deploy/docker-compose.proxy.yml up -d
name: edge

services:
  proxy:
    image: nginx:1.27-alpine
    container_name: edge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web

networks:
  web:
    external: true
